# gardener-vault.conf — profile for the marquee movie & TV wiki
# (the vault-template/ layout this repo's web app renders).
#
# Installed into the vault root by install.sh when the seed contains
# wiki/entities/Movies.md (or with --profile marquee-movies).

VAULT_DESCRIPTION="a personal movie & TV database: movie pages link to category pages across seven taste dimensions (genres, people, themes, style, platforms, eras, settings); the hub tracks a taste digest, a watchlist, and a not-interested list, with the deep profile in taste/Taste Profile"

# Pages live in exactly these directories (non-recursive each): movies, the
# seven category dimensions, and the deep taste profile (taste/ pages resolve
# links and count for orphans, mirroring lib/lint.ts).
PAGE_DIRS=wiki/movies:wiki/movies/genres:wiki/movies/people:wiki/movies/themes:wiki/movies/style:wiki/movies/platforms:wiki/movies/eras:wiki/movies/settings:wiki/movies/taste

# The hub is editable but only via link-level actions; watchlist and
# not-interested bullets name titles that legitimately have no page yet, and
# taste bullets must carry [[Category]] links.
HUB=wiki/entities/Movies.md
PAGELESS_SECTIONS=watchlist:not interested
LINKED_BULLET_SECTIONS=taste

# Frontmatter keys whose values carry wikilinks (counted as graph edges).
FRONTMATTER_LINK_KEYS=genres

# Mechanical daily summary + audit notes + proactive suggestions.
LOG_FILE=wiki/log.md
AUDITS_DIR=wiki/audits
SUGGESTIONS_DIR=wiki/suggestions

# Stub pages the LLM may create for dead links: kind name | where | identity.
STUB_KIND_MOVIES="wiki/movies|movie|movie"
STUB_KIND_GENRES="wiki/movies/genres|category|category"
STUB_DEFAULT=movies

# New genre stubs get indexed mechanically (never by the model) in their
# dimension's sub-index; the grand index is a routing table lint checks.
INDEX_FILE=wiki/movies/genres/_index.md
INDEXED_STUB_KIND=genres
GRAND_INDEX=wiki/movies/_index.md

# Category dimensions: orphan-adoption fallback candidates AND the dirs the
# hierarchical-index lint (each dimension _index.md mirrors its directory)
# runs over.
CATEGORY_DIRS=wiki/movies/genres:wiki/movies/people:wiki/movies/themes:wiki/movies/style:wiki/movies/platforms:wiki/movies/eras:wiki/movies/settings
