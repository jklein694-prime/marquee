# gardener-vault.conf — profile for the marquee movie & TV wiki
# (the vault-template/ layout this repo's web app renders).
#
# Installed into the vault root by install.sh when the seed contains
# wiki/entities/Movies.md (or with --profile marquee-movies).

VAULT_DESCRIPTION="a personal movie & TV database: movie pages link to genre/category pages; the hub tracks a taste profile and a watchlist"

# Pages live in exactly these directories (non-recursive each).
PAGE_DIRS=wiki/movies:wiki/movies/genres

# The hub is editable but only via link-level actions; its watchlist bullets
# name titles that legitimately have no page yet, and its taste bullets must
# carry [[Category]] links.
HUB=wiki/entities/Movies.md
PAGELESS_SECTIONS=watchlist
LINKED_BULLET_SECTIONS=taste

# Frontmatter keys whose values carry wikilinks (counted as graph edges).
FRONTMATTER_LINK_KEYS=genres

# Mechanical daily summary + audit notes.
LOG_FILE=wiki/log.md
AUDITS_DIR=wiki/audits

# Stub pages the LLM may create for dead links: kind name | where | identity.
STUB_KIND_MOVIES="wiki/movies|movie|movie"
STUB_KIND_GENRES="wiki/movies/genres|category|category"
STUB_DEFAULT=movies

# New category stubs get indexed mechanically (never by the model).
INDEX_FILE=wiki/movies/_index.md
INDEXED_STUB_KIND=genres

# Orphan-adoption fallback candidates when a page has no linked neighbors.
CATEGORY_DIRS=wiki/movies/genres
