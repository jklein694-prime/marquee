# gardener-vault.conf — GENERIC profile (all defaults, fully commented).
#
# You don't need this file at all: a vault with no gardener-vault.conf gets
# exactly these settings. Copy it into your vault root and uncomment lines
# only when your vault has structure worth telling the gardener about.

# One line describing what this vault is about; injected into the model's
# system prompt so its judgments fit the domain.
#VAULT_DESCRIPTION="my research notes on ..."

# Colon-separated directories (vault-relative, each scanned non-recursively)
# that contain pages. EMPTY = recursively scan the whole vault for .md files,
# skipping dot-directories (.obsidian, .git, ...), underscore-prefixed files
# and directories (_index.md, _templates/), the audits dir, the log file,
# READONLY_PATHS, and this profile file.
#PAGE_DIRS=notes:notes/projects

# A hub/summary page, if the vault has one. Setting it activates the hub
# rules: the LLM may only make link-level edits to it; PAGELESS_SECTIONS
# lists '## ' sections whose bullet titles legitimately have no page yet
# (excluded from dead-link lint); LINKED_BULLET_SECTIONS lists sections
# whose bullets must carry at least one [[link]].
#HUB=Home.md
#PAGELESS_SECTIONS=inbox
#LINKED_BULLET_SECTIONS=themes

# Frontmatter keys whose values carry wikilinks (counted as graph edges).
#FRONTMATTER_LINK_KEYS=related:topics

# A log file for the gardener's mechanical one-line daily summary.
# EMPTY = no daily log entries.
#LOG_FILE=log.md

# Where Sonnet audit notes land (created on first audit; read-only to the LLM).
#AUDITS_DIR=_audits

# Extra read-only paths (colon-separated files or directories).
#READONLY_PATHS=reference:archive/frozen.md

# Stub kinds the LLM may create for dead links: "dir|entity_type|tag".
# With no kinds defined, a stub is created next to the page that links to it,
# with minimal frontmatter. STUB_DEFAULT names the kind used when the task
# doesn't say otherwise.
#STUB_KIND_NOTES="notes|note|note"
#STUB_DEFAULT=notes

# Mechanically append new stubs of INDEXED_STUB_KIND to INDEX_FILE.
#INDEX_FILE=_index.md
#INDEXED_STUB_KIND=notes

# Orphan-adoption fallback candidates when a page has no linked neighbors
# (EMPTY = the orphan's sibling pages in the same directory).
#CATEGORY_DIRS=topics
