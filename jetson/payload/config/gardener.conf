# wikigardener configuration — installed to /etc/wikigardener/gardener.conf
# Shell-sourceable KEY=VALUE; also parsed by the python gardener.

# Where things live (defaults match install.sh; change only if you moved them)
VAULT_DIR=/var/lib/wikigardener/vault
QUEUE_DIR=/var/lib/wikigardener/queue
STATE_FILE=/var/lib/wikigardener/state.json
LLAMA_URL=http://127.0.0.1:8080

# How often the timer fires one gardening task (minutes). Raise this if the
# Nano runs hot or you want the wiki to evolve more slowly.
INTERVAL_MIN=15

# Hard daily ceiling on gardener commits — a runaway model can never rewrite
# the whole wiki in a night.
MAX_CHANGES_PER_DAY=40

# A page the gardener touched rests this many days before it can be sampled
# again (lint repairs are exempt — broken is broken).
COOLDOWN_DAYS=3

# Model context window tokens. 3072 fits the 1.5B tier in 4GB with headroom;
# drop to 2048 if llama-server gets OOM-killed.
CTX=3072

# LLM output budget per task and sampling temperature.
MAX_TOKENS=300
TEMPERATURE=0.3

# Give up on one completion after this many seconds (CPU inference is slow;
# a 300-token reply at ~2 tok/s is ~3 minutes — 600 is generous).
LLM_TIMEOUT_SEC=600

# Force the model tier regardless of detected RAM: "1.5b", "0.5b", or empty
# for auto-detect at install time.
TIER_OVERRIDE=
